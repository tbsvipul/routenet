name: routent_mobile
description: "routent premium navigation and proximity discovery app."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI / Assets
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  flutter_spinkit: ^5.2.1
  smooth_page_indicator: ^1.2.0+3

  # Core architecture
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  equatable: ^2.0.7
  logger: ^2.5.0



  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Networking & Utils
  http: ^1.6.0
  intl: ^0.20.2
  flutter_animate: ^4.5.2
  flutter_dotenv: ^6.0.0
  flutter_background_service: ^5.1.0
  carousel_slider: ^5.1.2
  image_picker: ^1.2.2
  http_parser: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/simplelogo.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/images/location_marker/
    - assets/images/tranperentlogo.png
   
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
